<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Helvetica, 'Microsoft YaHei', sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">
    多特征 Sigmoid 网络：3 个输入 → 3 个 Sigmoid 神经元 → 单输出
  </text>
  <text x="460" y="55" text-anchor="middle" font-size="14" fill="#555" font-style="italic">
    y = b + Σᵢ cᵢ · σ ( bᵢ + Σⱼ wᵢⱼ xⱼ )
  </text>

  <!-- Layer labels -->
  <text x="110" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">
    输入特征 (D=3)
  </text>
  <text x="450" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">
    隐藏层（N=3 Sigmoid 神经元）
  </text>
  <text x="800" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">
    输出
  </text>

  <!-- ============ EDGES: inputs → hidden (9 lines) ============ -->
  <!-- Use color coding by source input -->
  <!-- x1 (blue) -->
  <g stroke="#1976d2" stroke-width="1.3" opacity="0.75">
    <line x1="148" y1="160" x2="408" y2="160"/>
    <line x1="148" y1="160" x2="408" y2="260"/>
    <line x1="148" y1="160" x2="408" y2="360"/>
  </g>
  <!-- x2 (green) -->
  <g stroke="#2e7d32" stroke-width="1.3" opacity="0.75">
    <line x1="148" y1="260" x2="408" y2="160"/>
    <line x1="148" y1="260" x2="408" y2="260"/>
    <line x1="148" y1="260" x2="408" y2="360"/>
  </g>
  <!-- x3 (purple) -->
  <g stroke="#7b1fa2" stroke-width="1.3" opacity="0.75">
    <line x1="148" y1="360" x2="408" y2="160"/>
    <line x1="148" y1="360" x2="408" y2="260"/>
    <line x1="148" y1="360" x2="408" y2="360"/>
  </g>

  <!-- Weight labels (only label the 4 corners to convey the pattern) -->
  <g font-size="13" font-weight="bold">
    <text x="185" y="152" fill="#1976d2">w₁₁</text>
    <text x="365" y="180" fill="#1976d2">w₃₁</text>
    <text x="185" y="375" fill="#7b1fa2">w₁₃</text>
    <text x="365" y="380" fill="#7b1fa2">w₃₃</text>
  </g>
  <text x="270" y="455" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    （图中只标 4 个角的权重，其余 5 条权重同理：颜色与源 xⱼ 对应）
  </text>

  <!-- ============ EDGES: hidden → sum (3 lines with c labels) ============ -->
  <g stroke="#555" stroke-width="1.8">
    <line x1="478" y1="160" x2="650" y2="260"/>
    <line x1="478" y1="260" x2="650" y2="260"/>
    <line x1="478" y1="360" x2="650" y2="260"/>
  </g>
  <g font-size="14" font-weight="bold" fill="#d84315">
    <text x="555" y="200">c₁</text>
    <text x="555" y="252">c₂</text>
    <text x="555" y="335">c₃</text>
  </g>

  <!-- ============ EDGE: sum → output ============ -->
  <line x1="685" y1="260" x2="760" y2="260" stroke="#555" stroke-width="2.2"/>
  <polygon points="760,255 770,260 760,265" fill="#555"/>

  <!-- ============ EDGE: global bias → sum ============ -->
  <line x1="617" y1="395" x2="643" y2="285" stroke="#888" stroke-width="1.8" stroke-dasharray="4,3"/>

  <!-- ============ NODES: Inputs (yellow rounded rect) ============ -->
  <g>
    <rect x="78" y="135" width="70" height="50" rx="8" fill="#fff3cd" stroke="#d4a72c" stroke-width="2"/>
    <text x="113" y="167" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">x₁</text>
  </g>
  <g>
    <rect x="78" y="235" width="70" height="50" rx="8" fill="#fff3cd" stroke="#d4a72c" stroke-width="2"/>
    <text x="113" y="267" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">x₂</text>
  </g>
  <g>
    <rect x="78" y="335" width="70" height="50" rx="8" fill="#fff3cd" stroke="#d4a72c" stroke-width="2"/>
    <text x="113" y="367" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">x₃</text>
  </g>

  <!-- ============ NODES: Hidden Sigmoid Neurons (blue circles) ============ -->
  <!-- Compact label "σ" + "→ aᵢ" inside each circle -->
  <g>
    <circle cx="443" cy="160" r="35" fill="#cfe7fb" stroke="#1976d2" stroke-width="2.5"/>
    <text x="443" y="158" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d47a1">σ</text>
    <text x="443" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">→ a₁</text>
  </g>
  <g>
    <circle cx="443" cy="260" r="35" fill="#cfe7fb" stroke="#1976d2" stroke-width="2.5"/>
    <text x="443" y="258" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d47a1">σ</text>
    <text x="443" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">→ a₂</text>
  </g>
  <g>
    <circle cx="443" cy="360" r="35" fill="#cfe7fb" stroke="#1976d2" stroke-width="2.5"/>
    <text x="443" y="358" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d47a1">σ</text>
    <text x="443" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">→ a₃</text>
  </g>

  <!-- ============ NODE: Sum (orange circle) ============ -->
  <g>
    <circle cx="660" cy="260" r="28" fill="#ffe0b3" stroke="#f57c00" stroke-width="2.5"/>
    <text x="660" y="270" text-anchor="middle" font-size="26" font-weight="bold" fill="#bf360c">Σ</text>
  </g>

  <!-- ============ NODE: Bias (gray box) ============ -->
  <g>
    <rect x="585" y="395" width="65" height="36" rx="6" fill="#e8e8e8" stroke="#888" stroke-width="1.8"/>
    <text x="617" y="420" text-anchor="middle" font-size="16" font-weight="bold" fill="#444">b</text>
    <text x="617" y="450" text-anchor="middle" font-size="11" fill="#666">全局偏置</text>
  </g>

  <!-- ============ NODE: Output (pink rounded rect) ============ -->
  <g>
    <rect x="770" y="235" width="65" height="50" rx="8" fill="#ffd6e7" stroke="#c2185b" stroke-width="2.5"/>
    <text x="802" y="267" text-anchor="middle" font-size="22" font-weight="bold" fill="#880e4f">y</text>
  </g>

  <!-- ============ Legend ============ -->
  <g transform="translate(40, 480)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#666">图例：</text>
    <line x1="55" y1="-4" x2="80" y2="-4" stroke="#1976d2" stroke-width="2"/>
    <text x="85" y="0" font-size="12" fill="#1976d2">x₁ → 隐藏</text>
    <line x1="160" y1="-4" x2="185" y2="-4" stroke="#2e7d32" stroke-width="2"/>
    <text x="190" y="0" font-size="12" fill="#2e7d32">x₂ → 隐藏</text>
    <line x1="265" y1="-4" x2="290" y2="-4" stroke="#7b1fa2" stroke-width="2"/>
    <text x="295" y="0" font-size="12" fill="#7b1fa2">x₃ → 隐藏</text>
    <line x1="370" y1="-4" x2="395" y2="-4" stroke="#555" stroke-width="2"/>
    <text x="400" y="0" font-size="12" fill="#555">cᵢ：隐藏 → 求和</text>
    <line x1="520" y1="-4" x2="545" y2="-4" stroke="#888" stroke-width="1.8" stroke-dasharray="4,3"/>
    <text x="550" y="0" font-size="12" fill="#666">b：全局偏置接入</text>
  </g>
</svg>
